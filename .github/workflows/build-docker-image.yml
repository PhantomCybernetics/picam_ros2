name: Build Docker Image

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: phantomcybernetics/picam_ros2

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            ros_distro: rolling
            runner: ubuntu-24.04-arm
            platform: linux/arm64
          - arch: arm64
            ros_distro: lyrical
            runner: ubuntu-24.04-arm
            platform: linux/arm64
          - arch: arm64
            ros_distro: kilted
            runner: ubuntu-24.04-arm
            platform: linux/arm64
          - arch: arm64
            ros_distro: jazzy
            runner: ubuntu-24.04-arm
            platform: linux/arm64
          - arch: arm64
            ros_distro: iron
            runner: ubuntu-24.04-arm
            platform: linux/arm64
          - arch: arm64
            ros_distro: humble
            runner: ubuntu-24.04-arm
            platform: linux/arm64

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
      env:
        DOCKER_METADATA_ANNOTATIONS_LEVELS: manifest,index

    - name: Generate image name
      id: image
      run: |
        echo "image=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ matrix.ros_distro }}-${{ matrix.arch }}-${{ github.sha }}" >> $GITHUB_OUTPUT

    - name: Build and push Docker image
      id: build
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ./Dockerfile
        build-args: |
          ROS_DISTRO=${{ matrix.ros_distro }}
        push: true
        tags: ${{ steps.image.outputs.image }}
        labels: ${{ steps.meta.outputs.labels }}
        platforms: ${{ matrix.platform }}
        provenance: false # Disable provenance to avoid unknown/unknown
        sbom: false       # Disable sbom to avoid unknown/unknown
    
    - name: Create badge JSON
      if: always()   # runs even if build fails
      run: |
        if [ "${{ job.status }}" == "success" ]; then
          echo '{"schemaVersion":1,"label":"${{ matrix.ros_distro }}","message":"${{ matrix.arch }}","color":"green" }' \
            > ${{ matrix.ros_distro }}-${{ matrix.arch }}.json
        else
          echo '{"schemaVersion":1,"label":"${{ matrix.ros_distro }}","message":"${{ matrix.arch }}","color":"red", "isError":true}' \
            > ${{ matrix.ros_distro }}-${{ matrix.arch }}.json
        fi

    - name: Upload badge JSON as artifact
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: badge-${{ matrix.ros_distro }}-${{ matrix.arch }}
        path: ${{ matrix.ros_distro }}-${{ matrix.arch }}.json
        retention-days: 1

  push-multi-arch-manifest:
    runs-on: ubuntu-latest
    needs: build
    if: always()
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        ros_distro: [rolling, kilted, jazzy, iron, humble]

    steps:
    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
      env:
        DOCKER_METADATA_ANNOTATIONS_LEVELS: manifest,index

    - name: Check successful builds
      id: check_builds
      run: |
        # Check which architectures were successfully built for this ROS distro
        SUCCESSFUL_ARCHS=""
        
        # Check if arm64 build was successful for this ROS distro
        if docker buildx imagetools inspect "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ matrix.ros_distro }}-arm64-${{ github.sha }}"; then
          SUCCESSFUL_ARCHS="$SUCCESSFUL_ARCHS arm64"
        fi
        
        echo "successful_archs=$SUCCESSFUL_ARCHS" >> $GITHUB_OUTPUT
        echo "has_successful_builds=$([ -n "$SUCCESSFUL_ARCHS" ] && echo true || echo false)" >> $GITHUB_OUTPUT
        cat $GITHUB_OUTPUT

    - name: Create and push multi-arch manifest
      if: steps.check_builds.outputs.has_successful_builds == 'true'
      run: |
        # Create multi-arch manifest for each tag
        for tag in ${{ steps.meta.outputs.tags }}; do
          # Build the list of successful images for this manifest
          IMAGES=""
          for arch in ${{ steps.check_builds.outputs.successful_archs }}; do
            IMAGES="$IMAGES ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ matrix.ros_distro }}-${arch}-${{ github.sha }}"
          done

          if [ -n "$IMAGES" ]; then
            echo "Creating manifest for $tag with images: $IMAGES"
            docker buildx imagetools create --tag "$tag-${{ matrix.ros_distro }}" $IMAGES
          fi
        done
  
  deploy-badges:
    runs-on: ubuntu-latest
    needs: build
    if: always() && github.ref == 'refs/heads/main' # only updating badges on main
    permissions:
      contents: write   # needed to push to gh-pages branch
    steps:
    - name: Checkout build-badges branch
      uses: actions/checkout@v4
      with:
        ref: build-badges
        path: build-badges

    - name: Download all badge artifacts
      uses: actions/download-artifact@v4
      with:
        pattern: badge-*
        path: ./

    - name: Move JSON files to build-badges root
      run: |
        mkdir -p ./build-badges
        find ./ -name "*.json" -exec cp {} ./build-badges/ \;
        ls -la ./build-badges/

    - name: Commit and push badges
      run: |
        cd build-badges
        git config user.name github-actions
        git config user.email github-actions@github.com
        git add ./
        git diff --quiet && git diff --staged --quiet || git commit -m "Update build badges [skip ci]"
        git push origin build-badges